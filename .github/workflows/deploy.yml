name: ASIK App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Build Next.js application
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/asik_db?schema=public"
        NEXTAUTH_SECRET: "secret_jwt_key_here_minimum_32_characters"
